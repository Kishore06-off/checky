app = "govcheck-ai"
primary_region = "iad"

[build]
  builder = "heroku/buildpacks:python"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = 10000
    grace_period = "5s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = 2000

  [[services.http_checks.matchers]]
    status = 200

[deploy]
  strategy = "canary"

[[scale]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[experimental]
  cmd = ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
